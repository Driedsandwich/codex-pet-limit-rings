name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    name: verify (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-15
          - macos-26
    steps:
      - uses: actions/checkout@v6
      - name: Verify build, tests, privacy, and release metadata
        run: tools/verify-release.sh
      - name: Build and verify the v0.8.0 package candidate
        run: tools/package-release.sh
      - name: Smoke-test the published v0.8.0 artifact
        env:
          EXPECTED_MIN_OS: "15.0"
        run: |
          tools/smoke-release-artifact.sh 0.8.0
